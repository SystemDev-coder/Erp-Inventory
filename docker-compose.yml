version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - server/.env.docker
    environment:
      # Coolify/CI deployments might not load `env_file` as expected.
      # Ensure Postgres always receives a non-empty superuser password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-erp_inventory}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 5m
    networks: [inventory_net]

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.nomount
    command: ["sh", "/app/docker/entrypoint.sh"]
    restart: unless-stopped
    env_file:
      - server/.env.docker
    environment:
      CHOKIDAR_USEPOLLING: "1"
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    # No bind mounts in deploy environments (prevents hiding /app contents)
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [inventory_net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.nomount
    command: ["npm","run","dev","--","--host","0.0.0.0","--port","5173"]
    restart: unless-stopped
    env_file:
      - frontend/.env.docker
    environment:
      CHOKIDAR_USEPOLLING: "1"
    depends_on:
      server:
        condition: service_started
    ports:
      - "5173:5173"
    # No bind mounts in deploy environments (prevents hiding /app contents)
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [inventory_net]

volumes:
  pgdata:

networks:
  inventory_net:
    driver: bridge
