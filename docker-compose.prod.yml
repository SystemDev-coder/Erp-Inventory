version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - server/.env.docker
    environment:
      # Ensure Postgres always receives a non-empty superuser password.
      # Override via Coolify env: `POSTGRES_PASSWORD=...`
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-erp_inventory}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./server/sql:/docker-entrypoint-initdb.d/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 5m
    networks: [inventory_net]

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - server/.env.docker
    environment:
      NODE_ENV: production
      # Ensure DB vars exist even if the platform ignores `env_file`.
      PGHOST: ${PGHOST:-db}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${POSTGRES_DB:-erp_inventory}
      PGSCHEMA: ${PGSCHEMA:-ims}
      PGUSER: ${PGUSER:-ims_app}
      # Use the same password as the Postgres container by default.
      PGPASSWORD: ${POSTGRES_PASSWORD:-123}
      ADMIN_PGUSER: ${ADMIN_PGUSER:-postgres}
      ADMIN_PGPASSWORD: ${POSTGRES_PASSWORD:-123}
      # JWT secrets (set these in your platform; defaults are for bootstrapping only).
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-at-least-32-chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-at-least-32-chars}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - server_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [inventory_net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [inventory_net]

volumes:
  pgdata:
  server_uploads:

networks:
  inventory_net:
    driver: bridge
